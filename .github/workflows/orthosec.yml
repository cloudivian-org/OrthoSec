# Drop this into any AI product repo to gate PRs on AI-security risk.
# On a pull request: scans only the changed files (fast) and posts findings inline
# via GitHub code scanning. On push to main: full scan. SARIF is uploaded either way.
name: OrthoSec

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write   # required to upload SARIF to code scanning

jobs:
  ai-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so --diff can compare against the PR base

      - name: OrthoSec AI Security Scan
        uses: cloudivian-org/OrthoSec@main
        with:
          path: "."
          profile: "appsec"
          fail-on: "high"
          sarif-file: "orthosec.sarif"
          # On a PR, scan only what changed vs the base branch; on push, scan everything.
          diff-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}

      - name: Upload SARIF to code scanning
        if: always()   # upload findings even when the scan fails the gate
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "orthosec.sarif"
