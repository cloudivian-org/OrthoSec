# Runs the test suite + detection benchmark on every push and PR.
# Free and unlimited on public repos. This is the green check behind the
# "98 tests, 100% / 0 FP" claim — keep it passing before every release.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev + JS AST extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,js]"

      - name: Test suite
        run: pytest -q

      - name: "Detection-efficacy benchmark (gate 100% / 0 FP)"
        run: python benchmark/run.py
