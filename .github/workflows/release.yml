# Build and publish the OrthoSec container to GitHub Container Registry (GHCR)
# on every semver tag (v*) and on published releases.
# Result: ghcr.io/cloudivian-org/orthosec:<version> and :latest
name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orthosec
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Publish to PyPI via Trusted Publishing (OIDC) — no API token stored in the repo.
  # Requires a one-time trusted publisher setup on PyPI for this repo + workflow
  # (see PUBLISHING.md). Runs only on a published GitHub Release.
  publish-pypi:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/orthosec/
    permissions:
      id-token: write   # mint the OIDC token PyPI trusts; no password/secret needed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
